services:
  - type: web
    name: carlos-cne
    runtime: python
    rootDir: ADRIANA
    buildCommand: pip install -r requirements.txt
    startCommand: python servidor.py $PORT
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONIOENCODING
        value: "utf-8"
