<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Búsqueda Global — Cuentas Claras CNE</title>
<link rel="stylesheet" href="vendor/css/bootstrap.min.css">
<link rel="stylesheet" href="css/cne-theme.css">
<link rel="stylesheet" href="vendor/css/all.min.css">
<style>
body{background:#f4f6fb;font-family:'Segoe UI',sans-serif;font-size:.92rem}
.navbar{background:linear-gradient(90deg,#003478,#1565c0);padding:.5rem 1.5rem}
.navbar-brand{color:#fff!important;font-weight:700;font-size:1.1rem}
.search-box{background:#fff;border-radius:16px;padding:2rem;box-shadow:0 4px 20px rgba(0,0,0,.1);max-width:700px;margin:2rem auto}
.result-card{background:#fff;border-radius:10px;padding:1rem 1.2rem;margin-bottom:.6rem;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #003478;transition:box-shadow .2s}
.result-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.13)}
.badge-corp{font-size:.68rem;padding:.2rem .5rem;border-radius:20px}
.highlight{background:#fff3cd;border-radius:3px;padding:0 2px}
#resultados-wrap{max-width:900px;margin:0 auto}
.stats-bar{background:#e8f0fe;border-radius:10px;padding:.6rem 1rem;font-size:.82rem;color:#003478;max-width:700px;margin:.5rem auto 1.5rem}
.cargando-idx{background:#e8f0fe;border-radius:10px;padding:.7rem 1.2rem;font-size:.82rem;color:#003478;max-width:700px;margin:0 auto 1rem;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>

<nav class="navbar navbar-dark px-3 py-2">
  <a class="navbar-brand" href="analisis_cc.html"><i class="fa fa-chart-bar me-2"></i>Cuentas Claras CNE</a>
  <div class="ms-auto d-flex gap-2">
    <a href="partido.html" class="btn btn-outline-light btn-sm"><i class="fa fa-flag me-1"></i>Partidos</a>
    <a href="adriana.html" class="btn btn-outline-warning btn-sm"><i class="fa fa-arrow-left me-1"></i>Portal</a>
  </div>
</nav>

<div class="search-box">
  <h5 class="fw-bold text-primary mb-1"><i class="fa fa-search me-2"></i>Búsqueda Global</h5>
  <p class="text-muted small mb-3">Busque por nombre de candidato, cédula, partido, gerente de campaña o contador</p>
  <div class="input-group input-group-lg">
    <input type="text" id="q-input" class="form-control"
      placeholder="Ej: Juan García, 12345678, Partido Liberal, Danilo Rico..."
      autofocus
      onkeydown="if(event.key==='Enter') buscar()">
    <button class="btn btn-primary px-4" onclick="buscar()"><i class="fa fa-search"></i></button>
  </div>
  <div class="mt-2 d-flex gap-2 flex-wrap">
    <small class="text-muted">Buscar en:</small>
    <div class="form-check form-check-inline mb-0"><input class="form-check-input" type="checkbox" id="chk-cand" checked><label class="form-check-label small" for="chk-cand">Candidatos</label></div>
    <div class="form-check form-check-inline mb-0"><input class="form-check-input" type="checkbox" id="chk-ger"  checked><label class="form-check-label small" for="chk-ger">Gerentes</label></div>
    <div class="form-check form-check-inline mb-0"><input class="form-check-input" type="checkbox" id="chk-cont" checked><label class="form-check-label small" for="chk-cont">Contadores</label></div>
    <div class="form-check form-check-inline mb-0"><input class="form-check-input" type="checkbox" id="chk-part" checked><label class="form-check-label small" for="chk-part">Partidos</label></div>
  </div>
</div>

<div id="idx-status" class="cargando-idx" style="display:none">
  <i class="fa fa-spinner fa-spin"></i>
  <span id="idx-msg">Cargando índice de búsqueda…</span>
</div>

<div id="stats-bar" class="stats-bar" style="display:none"></div>
<div id="resultados-wrap"></div>

<script>
const CORP_COLOR = {
  'Concejo':'primary','Alcaldía':'success','Asamblea':'warning',
  'Gobernación':'danger','JAL':'info','Otro':'secondary'
};
const fmt = n => n > 0 ? '$' + Number(n).toLocaleString('es-CO', {maximumFractionDigits:0}) : '';

// ── Normalización para búsqueda ───────────────────────────────────────────────
const norm = s => (s || '').toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

// ── Índice en memoria ─────────────────────────────────────────────────────────
let _idx   = [];     // array de registros completos
let _norms = [];     // string pre-normalizado por registro
let _listo = false;
let _cargando = false;

const idxStatus = document.getElementById('idx-status');
const idxMsg    = document.getElementById('idx-msg');

async function cargarIndice() {
  if (_listo || _cargando) return;
  _cargando = true;
  idxStatus.style.display = 'flex';
  idxMsg.textContent = 'Cargando índice (138.000 registros)…';

  try {
    const r = await fetch('data/buscar_index.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    _idx = await r.json();

    // Pre-normalizar campo de búsqueda
    _norms = _idx.map(c =>
      [c.n, c.cc, c.o, c.gn, c.cn].map(norm).join('|')
    );

    _listo = true;
    idxMsg.textContent = _idx.length.toLocaleString('es-CO') + ' registros listos';
    setTimeout(() => { idxStatus.style.display = 'none'; }, 2000);
  } catch (e) {
    idxMsg.textContent = 'Error cargando índice: ' + e.message;
  }
  _cargando = false;
}

// Cargar índice al abrir la página
cargarIndice();

// ── Búsqueda ──────────────────────────────────────────────────────────────────
let _ultimaQ = '';

function buscar() {
  const q = document.getElementById('q-input').value.trim();
  if (!q) return;
  if (q === _ultimaQ && _listo) return;
  _ultimaQ = q;

  const wrap = document.getElementById('resultados-wrap');
  const bar  = document.getElementById('stats-bar');

  if (!_listo) {
    wrap.innerHTML = '<div class="text-center text-muted py-4"><i class="fa fa-spinner fa-spin fa-2x"></i><br><small>Cargando índice, espera un momento…</small></div>';
    bar.style.display = 'none';
    // Reintentar en 1s
    setTimeout(buscar, 1000);
    return;
  }

  wrap.innerHTML = '<div class="text-center text-muted py-3"><i class="fa fa-spinner fa-spin"></i> Buscando…</div>';
  bar.style.display = 'none';

  // Búsqueda asíncrona (no bloquea UI)
  setTimeout(() => {
    const qN = norm(q);
    const chkCand = document.getElementById('chk-cand').checked;
    const chkGer  = document.getElementById('chk-ger').checked;
    const chkCont = document.getElementById('chk-cont').checked;
    const chkPart = document.getElementById('chk-part').checked;
    const LIMIT = 200;

    const filtrados = [];
    for (let i = 0; i < _idx.length && filtrados.length < LIMIT; i++) {
      const c = _idx[i];
      if (!_norms[i].includes(qN)) continue;
      const enCand = norm(c.n).includes(qN) || norm(c.cc).includes(qN);
      const enGer  = norm(c.gn).includes(qN);
      const enCont = norm(c.cn).includes(qN);
      const enPart = norm(c.o).includes(qN);
      if ((chkCand && enCand) || (chkGer && enGer) || (chkCont && enCont) || (chkPart && enPart)) {
        filtrados.push(c);
      }
    }

    if (!filtrados.length) {
      wrap.innerHTML = `<div class="text-center text-muted py-5"><i class="fa fa-search fa-2x mb-2"></i><br>No se encontraron resultados para <strong>"${q}"</strong></div>`;
      bar.style.display = 'none';
      return;
    }

    // Contar total real (sin límite)
    let total = 0;
    for (let i = 0; i < _idx.length; i++) {
      if (!_norms[i].includes(qN)) continue;
      const c = _idx[i];
      const enCand = norm(c.n).includes(qN) || norm(c.cc).includes(qN);
      const enGer  = norm(c.gn).includes(qN);
      const enCont = norm(c.cn).includes(qN);
      const enPart = norm(c.o).includes(qN);
      if ((chkCand && enCand) || (chkGer && enGer) || (chkCont && enCont) || (chkPart && enPart)) total++;
    }

    bar.style.display = '';
    bar.innerHTML = `<i class="fa fa-info-circle me-1"></i>
      <strong>${total.toLocaleString('es-CO')}</strong> resultado${total!==1?'s':''} para <strong>"${q}"</strong>
      ${total > LIMIT ? ` <span class="text-warning">(mostrando primeros ${LIMIT})</span>` : ''}`;

    const hl = txt => {
      if (!txt) return '';
      const rx = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
      return txt.replace(rx, '<span class="highlight">$1</span>');
    };

    wrap.innerHTML = filtrados.map(c => {
      const corpCls = CORP_COLOR[c.co] || 'secondary';
      const ingGas = (c.i || c.g || c.v) ?
        `${c.v > 0 ? `<span class="text-primary small me-2"><i class="fa fa-vote-yea me-1"></i>${Number(c.v).toLocaleString('es-CO')}</span>` : ''}
         <span class="text-success small me-2">${fmt(c.i)}</span><span class="text-danger small">${fmt(c.g)}</span>` : '';
      let equipo = '';
      if (c.gn) equipo += `<span class="me-3 small"><i class="fa fa-user-tie text-warning me-1"></i><strong>Gerente:</strong> ${hl(c.gn)}${c.gcc ? ' <span class="text-muted">C.C. ' + c.gcc + '</span>' : ''}</span>`;
      if (c.cn) equipo += `<span class="small"><i class="fa fa-calculator text-info me-1"></i><strong>Contador:</strong> ${hl(c.cn)}${c.ccc ? ' <span class="text-muted">C.C. ' + c.ccc + '</span>' : ''}</span>`;
      return `<div class="result-card">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <strong class="fs-6">${hl(c.n)}</strong>
            ${c.cc ? `<span class="text-muted small ms-2">C.C. ${hl(c.cc)}</span>` : ''}
            <br>
            <span class="small text-muted">${hl(c.o || '')}</span>
            <span class="ms-2 small text-muted"><i class="fa fa-map-marker-alt me-1"></i>${c.m}, ${c.d}</span>
          </div>
          <div class="text-end">
            <span class="badge bg-${corpCls} badge-corp">${c.co || ''}</span>
            ${ingGas ? `<br><small class="mt-1 d-block">${ingGas}</small>` : ''}
          </div>
        </div>
        ${equipo ? `<div class="mt-1 pt-1 border-top">${equipo}</div>` : ''}
      </div>`;
    }).join('');
  }, 10);
}

// Búsqueda desde URL (?q=...)
const urlQ = new URLSearchParams(location.search).get('q');
if (urlQ) {
  document.getElementById('q-input').value = urlQ;
  // Esperar a que el índice cargue
  const waitAndSearch = () => _listo ? buscar() : setTimeout(waitAndSearch, 500);
  waitAndSearch();
}
</script>
</body>
</html>
